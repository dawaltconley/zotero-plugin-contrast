<vbox onload="__addonInstance___Preferences.init()">
  <linkset>
    <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  </linkset>
  <groupbox>
    <hbox align="center">
      <checkbox
        id="__addonRef___enabled-brightness"
        preference="__prefsPrefix__.enabled-brightness"
        data-l10n-id="brightness-filter"
      />
      <html:input
        type="number"
        min="50"
        max="150"
        step="5"
        preference="__prefsPrefix__.default-brightness"
        style="width: 5em; margin-inline-start: 8px"
      />
    </hbox>
    <hbox align="center">
      <checkbox
        id="__addonRef___enabled-contrast"
        preference="__prefsPrefix__.enabled-contrast"
        data-l10n-id="contrast-filter"
      />
      <html:input
        type="number"
        min="80"
        max="360"
        step="10"
        preference="__prefsPrefix__.default-contrast"
        style="width: 5em; margin-inline-start: 8px"
      />
    </hbox>
    <hbox align="center">
      <checkbox
        id="__addonRef___enabled-saturate"
        preference="__prefsPrefix__.enabled-saturate"
        data-l10n-id="saturate-filter"
      />
      <html:input
        type="number"
        min="0"
        max="200"
        step="10"
        preference="__prefsPrefix__.default-saturate"
        style="width: 5em; margin-inline-start: 8px"
      />
    </hbox>
    <hbox align="center">
      <checkbox
        id="__addonRef___enabled-grayscale"
        preference="__prefsPrefix__.enabled-grayscale"
        data-l10n-id="grayscale-filter"
      />
      <html:input
        type="number"
        min="0"
        max="100"
        step="5"
        preference="__prefsPrefix__.default-grayscale"
        style="width: 5em; margin-inline-start: 8px"
      />
    </hbox>
    <hbox align="center">
      <checkbox
        id="__addonRef___enabled-sepia"
        preference="__prefsPrefix__.enabled-sepia"
        data-l10n-id="sepia-filter"
      />
      <html:input
        type="number"
        min="0"
        max="100"
        step="5"
        preference="__prefsPrefix__.default-sepia"
        style="width: 5em; margin-inline-start: 8px"
      />
    </hbox>
    <hbox align="center">
      <checkbox
        id="__addonRef___enabled-hue-rotate"
        preference="__prefsPrefix__.enabled-hue-rotate"
        data-l10n-id="hue-rotate-filter"
      />
      <html:input
        type="number"
        min="0"
        max="360"
        step="15"
        preference="__prefsPrefix__.default-hue-rotate"
        style="width: 5em; margin-inline-start: 8px"
      />
    </hbox>
    <hbox align="center">
      <checkbox
        id="__addonRef___enabled-invert"
        preference="__prefsPrefix__.enabled-invert"
        data-l10n-id="invert-filter"
      />
      <html:input
        type="number"
        min="0"
        max="100"
        step="5"
        preference="__prefsPrefix__.default-invert"
        style="width: 5em; margin-inline-start: 8px"
      />
    </hbox>
  </groupbox>
</vbox>
